# Docker image used for all pipeline steps (Node.js version 20)
image: node:20

pipelines:

  # DEFAULT: runs on every push to ANY branch (feature branches, bugfixes, etc.)
  # This is just a quick check to make sure the code builds without errors
  default:
    - step:
        name: Build Check
        caches:
          - node  # Saves node_modules between runs so npm doesn't reinstall everything each time
        script:
          - npm ci        # Installs packages (faster and stricter than npm install)
          - npm run build # Builds the app to check for errors
        artifacts:
          - dist/**  # Saves the dist/ folder (the built files) for later steps if needed

  # BRANCH-SPECIFIC: different branches trigger different actions
  branches:

    # DEVELOP BRANCH: auto-deploys to your staging VPS when you push to develop
    develop:
      - step:
          name: Build
          caches:
            - node
          script:
            - npm ci
            - npm run build
          artifacts:
            - dist/**

      - step:
          name: Deploy to Staging
          deployment: staging  # Links this step to the "staging" environment in Bitbucket
          script:
            # Copies the built files from dist/ to your staging server via SCP (secure copy)
            - pipe: atlassian/scp-deploy:1.4.0
              variables:
                USER: $SERVER_USER          # SSH username (from repository variables)
                SERVER: $STAGING_SERVER      # Staging server IP (from repository variables)
                REMOTE_PATH: $STAGING_PATH  # Folder on the server where files go
                LOCAL_PATH: 'dist/*'        # The built files to upload

            # After copying files, SSH into the server and restart nginx to serve the new files
            - pipe: atlassian/ssh-run:0.8.1
              variables:
                SSH_USER: $SERVER_USER
                SERVER: $STAGING_SERVER
                COMMAND: 'sudo systemctl reload nginx'  # Tells nginx to load the new files

    # MAIN BRANCH: builds and deploys to Azure (production)
    main:
      - step:
          name: Build
          caches:
            - node
          script:
            - npm ci
            - npm run build
            # Azure needs a zip file, not loose files
            - apt-get update && apt-get install -y zip  # Installs the zip tool
            - cd dist && zip -r ../deploy.zip . && cd .. # Zips everything in dist/ into deploy.zip
          artifacts:
            - deploy.zip  # Passes the zip file to the next step

      - step:
          name: Deploy to Azure
          script:
            # Uses Microsoft's official pipe to deploy the zip to Azure Web App
            - pipe: microsoft/azure-web-apps-deploy:1.0.3
              variables:
                AZURE_APP_NAME: "mnee-app"  # Your app name on Azure
                AZURE_PUBLISH_PROFILE: $AZURE_WEBAPP_PUBLISH_PROFILE  # The secret key from Azure (from repository variables)
                ZIP_FILE: "deploy.zip"  # The zip file to upload